server:
  port: 8081
  tomcat:
    connection-timeout: 10000

spring:
  application:
    name: gateway
  cloud:
    discovery:
      client:
        simple:
          instances:
            wallet-service:
              - uri: http://localhost:8082
            inventory-service:
              - uri: http://localhost:8083

seata:
  enabled: true
  application-id: gateway
  tx-service-group: demo-test
  service:
    vgroupMapping:
      demo-test: default
    grouplist:
      default: 127.0.0.1:8088

order-service:
  base-url: http://localhost:8084/order-service

wallet-service:
  connectTimeout: 10000
  readTimeout: 10000
  path: /wallet-service/api

inventory-service:
  connectTimeout: 10000
  readTimeout: 10000
  path: /inventory-service/api
